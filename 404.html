<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Redirect ke index.html
      sessionStorage.redirect = location.href;
      location.href = location.pathname.replace(/\/[^/]*$/, '/index.html');
    </script>
  </head>
  <body></body>
</html>
